<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Additional Controls</title>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, intital-scale=1.0">
	  <!--Bootstrap link-->
	 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
	
  <body>
		  <form>
			  <fieldset>
			  <!--Type of position-->
			  <label for="job position"><strong>Select Job Position:</strong></label><br><br>
			  <select name="job position">
  				<option value="">--Choose a Job Position--</option>
  				<option value="part_time">Part Time</option>
  				<option value="full_time">Full Time</option>
  				<option value="contract">contract</option>
				<option value="internship">Internship</option>
				
				</select>
				<br>
			  
			  <!-- Willingness to Relocate -->
			  <label>
				<input type="radio" name="yes">Yes</label>
			  <br>

			<label>
				<input type="radio" name="no">No</label>
			  <br>

			  <!-- Submit and Reset Buttons -->
			<input type="submit" value="Submit">
			<input type="reset" value="Reset">	
			  </fieldset>  
		  </form>
	  
	  <footer>
			<div class="container">
        	<p class="text-white text-center bg-success p-3">&Copy:2026 Application Form</p>
        	</div>
		</footer>

    

    
  </body>
  
  
</html>
