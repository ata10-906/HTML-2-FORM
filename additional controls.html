	  <main>
		  <form>
			  <!--Type of position-->
			  <label for="job position"><strong>Type Of Job Position:</strong></label>
			  <br>
			  <input type="text"  name="job position">
				<br>
			  <select name="job position">
  				<option value="">--Choose a Job Position--</option>
  				<option value="account_executive">Account Exexcutive</option>
  				<option value="business_development">Business Development</option>
  				<option value="inside_sales">Inside Sales</option>
				<option value="sales_manager">Sales Manager</option>
				<option value="vp_sales">VP Sales</option>
				</select>
				<br>
			  
			  <!-- Willingness to Relocate -->
			  <label>
				<input type="radio" name="yes">Yes</label>
			  <br>

			<label>
				<input type="radio" name="no">No</label>
			  <br>

			<label>
				<input type="radio" name="maybe">Maybe</label>
			  <br>

			  <!-- Submit and Reset Buttons -->
			<input type="submit" value="Submit Application">
			<input type="reset" value="Reset Form">	  
		  </form>
