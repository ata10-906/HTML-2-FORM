<!DOCTYPE html>
<html lang="en">
  <head>
	  <title>APPLICATION FORM</title>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, intital-scale=1.0">
	  <!--Bootstrap link-->
	 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="javascript.js"></script>
		<!--Custom CSS-->
		 <link rel="stylesheet" href="style.css">
	  <!--JavaScript-->
		<script src="javascript.js"></script>
  </head>
	
  <body>
	 <header class="bg-dark text-white text-center p-3">
    <h1>Application Form</h1>
</header>

<div class="container mt-4">

<form onsubmit="return validateForm()">

<!-- Contact Info -->
<fieldset>
<legend>Contact Information</legend>

<label>Username:</label>
<input type="text" id="name" class="form-control">
<br>

<label>Email:</label>
<input type="text" id="email" class="form-control">
<br>

<label>Telephone:</label>
<input type="text" id="telephone" class="form-control">
<br>

</fieldset>

<br>

<!-- Job Positions -->
<fieldset>
<legend>Job Positions</legend>

<input type="checkbox"> Account Executive<br>
<input type="checkbox"> Business Development<br>
<input type="checkbox"> Inside Sales<br>
<input type="checkbox"> Sales Manager<br>
<input type="checkbox"> VP Sales<br>

</fieldset>

<br>

<!-- Type of Position -->
<fieldset>
<legend>Type of Position</legend>

<select id="position" class="form-control">
<option value="">--Choose a Job Position--</option>
<option value="part_time">Part Time</option>
<option value="full_time">Full Time</option>
<option value="contract">Contract</option>
<option value="internship">Internship</option>
</select>

</fieldset>

<br>

<!-- Relocation -->
<fieldset>
<legend>Willingness to Relocate</legend>

<input type="radio" name="relocate"> Yes
<br>

<input type="radio" name="relocate"> No

</fieldset>

<br>

<input type="submit" value="Submit" class="btn btn-success">
<input type="reset" value="Reset" class="btn btn-danger">

</form>

</div> 

            
  
	  <footer>
			<div class="container-fluid">
        	<p class="text-white text-center bg-success p-3">&Copy:2026 Application Form</p>
        	</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script> 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script> 
	  </footer>
  
  </body>
</html>
